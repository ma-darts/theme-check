<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テーマ・エフェクト管理</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
}

/* フィルター */
.filter button {
  margin: 3px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  background: #ddd;
  cursor: pointer;
}

.filter button.active {
  background: #4caf50;
  color: #fff;
}

/* タイトル＋バー横並び */
.section {
  display: flex;
  align-items: center;
  gap: 10px;
}

.progress {
  position: relative;
  height: 14px;
  background: #eee;
  width: 50%;
  max-width: 200px;
}

.bar {
  height: 100%;
  background: #4caf50;
}

.progress span {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 10px;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}

/* カード */
.item {
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 6px;
  text-align: center;
  font-size: 12px;
  background: #fafafa;
}

.item img {
  width: 100%;
  border-radius: 6px;
}

/* ボタン */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 6px;
}

.btn {
  padding: 10px 0;
  border: none;
  border-radius: 6px;
  background: #ddd;
  cursor: pointer;
}

.btn:active {
  transform: scale(0.96);
}

.got {
  background: #4caf50;
  color: #fff;
}
</style>
</head>

<body>

<h2>テーマ・エフェクト管理</h2>

<!-- 種類フィルター -->
<div class="filter" id="typeFilter">
  <button onclick="setType('all')">全体</button>
  <button onclick="setType('theme')">テーマ(Live2)</button>
  <button onclick="setType('effect')">エフェクト(Live3)</button>
</div>

<!-- 年度フィルター -->
<div class="filter" id="yearFilter"></div>

<!-- テーマ -->
<div class="section">
  <h3>テーマ</h3>
  <div class="progress">
    <div class="bar" id="bar_theme"></div>
    <span id="text_theme"></span>
  </div>
</div>

<!-- エフェクト -->
<div class="section">
  <h3>エフェクト</h3>
  <div class="progress">
    <div class="bar" id="bar_effect"></div>
    <span id="text_effect"></span>
  </div>
</div>

<div class="grid" id="list"></div>

<script>
const data = [
  { name: 'item1', img: 'item1.png', year: 2023, theme: false, effect: false },
  { name: 'item2', img: 'item2.png', year: 2024, theme: false, effect: false }
];

let selectedType = 'all';
let selectedYear = 'all';

/* 年度フィルター */
function createYearFilter() {
  const el = document.getElementById('yearFilter');
  el.innerHTML = '';

  const years = [...new Set(data.map(d => d.year))];

  const allBtn = document.createElement('button');
  allBtn.textContent = 'すべて';
  allBtn.onclick = () => setYear('all');
  el.appendChild(allBtn);

  years.forEach(y => {
    const btn = document.createElement('button');
    btn.textContent = y;
    btn.onclick = () => setYear(y);
    el.appendChild(btn);
  });
}

/* フィルター色更新 */
function updateFilterUI() {
  document.querySelectorAll('#typeFilter button').forEach(btn => {
    btn.classList.remove('active');
  });

  document.querySelectorAll('#yearFilter button').forEach(btn => {
    btn.classList.remove('active');
  });

  const typeBtns = document.querySelectorAll('#typeFilter button');
  if (selectedType === 'all') typeBtns[0].classList.add('active');
  if (selectedType === 'theme') typeBtns[1].classList.add('active');
  if (selectedType === 'effect') typeBtns[2].classList.add('active');

  const yearBtns = document.querySelectorAll('#yearFilter button');
  yearBtns.forEach(btn => {
    if (btn.textContent == selectedYear || (selectedYear === 'all' && btn.textContent === 'すべて')) {
      btn.classList.add('active');
    }
  });
}

/* 描画 */
function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  let themeDone = 0;
  let effectDone = 0;

  data.forEach(item => {

    if (item.theme) themeDone++;
    if (item.effect) effectDone++;

    if (selectedType === 'theme' && item.theme) return;
    if (selectedType === 'effect' && item.effect) return;

    if (selectedYear !== 'all' && item.year !== selectedYear) return;

    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <img src="${item.img}">
      <div>${item.name}</div>
      <div>${item.year}</div>

      <div class="btn-group">
        <button class="btn ${item.theme ? 'got' : ''}">テーマ</button>
        <button class="btn ${item.effect ? 'got' : ''}">エフェクト</button>
      </div>
    `;

    const btns = div.querySelectorAll('button');

    btns[0].onclick = () => {
      item.theme = !item.theme;
      render();
    };

    btns[1].onclick = () => {
      item.effect = !item.effect;
      render();
    };

    list.appendChild(div);
  });

  updateBar('theme', themeDone);
  updateBar('effect', effectDone);
  updateFilterUI();
}

/* バー */
function updateBar(type, done) {
  const total = data.length;
  const percent = Math.floor(done / total * 100);

  document.getElementById('bar_' + type).style.width = percent + '%';
  document.getElementById('text_' + type).textContent =
    `${done}/${total}`;
}

/* フィルター操作 */
function setType(t) {
  selectedType = t;
  render();
}

function setYear(y) {
  selectedYear = y;
  render();
}

/* 初期化 */
createYearFilter();
render();
</script>

</body>
</html>
