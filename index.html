<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テーマ・エフェクト管理</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
}

/* フィルター */
.filter button {
  margin: 3px;
}

/* 進捗バー */
.progress {
  position: relative;
  height: 16px;
  background: #eee;
  margin: 15px auto;
  width: 50%;
  max-width: 300px;
  cursor: pointer;
}

.bar {
  height: 100%;
  background: #4caf50;
}

.progress span {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 11px;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
}

.item {
  text-align: center;
  font-size: 12px;
}

.item img {
  width: 100%;
}

/* ボタン（縦並び最適化） */
.btn-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 6px;
}

.btn {
  width: 100%;
  padding: 10px 0;
  font-size: 13px;
  border: none;
  border-radius: 8px;
  background: #ddd;
  cursor: pointer;
}

.btn:active {
  transform: scale(0.96);
}

.got {
  background: #4caf50;
  color: #fff;
}
</style>
</head>

<body>

<h2>テーマ・エフェクト管理</h2>

<!-- 種類フィルター -->
<div class="filter">
  <button onclick="setType('all')">全体</button>
  <button onclick="setType('theme')">テーマ(Live2)</button>
  <button onclick="setType('effect')">エフェクト(Live3)</button>
</div>

<!-- 年度フィルター -->
<div class="filter" id="yearFilter"></div>

<h3>テーマ</h3>
<div class="progress" onclick="showMissing('theme')">
  <div class="bar" id="bar_theme"></div>
  <span id="text_theme"></span>
</div>

<h3>エフェクト</h3>
<div class="progress" onclick="showMissing('effect')">
  <div class="bar" id="bar_effect"></div>
  <span id="text_effect"></span>
</div>

<div class="grid" id="list"></div>

<script>
const data = [
  { name: 'item1', img: 'item1.png', year: 2023, theme: false, effect: false },
  { name: 'item2', img: 'item2.png', year: 2024, theme: false, effect: false }
];

/* フィルター状態 */
let selectedType = 'all';
let selectedYear = 'all';

/* 年度フィルター生成 */
function createYearFilter() {
  const el = document.getElementById('yearFilter');
  el.innerHTML = '';

  const years = [...new Set(data.map(d => d.year))];

  const allBtn = document.createElement('button');
  allBtn.textContent = 'すべて';
  allBtn.onclick = () => setYear('all');
  el.appendChild(allBtn);

  years.forEach(y => {
    const btn = document.createElement('button');
    btn.textContent = y;
    btn.onclick = () => setYear(y);
    el.appendChild(btn);
  });
}

/* 描画 */
function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  let themeDone = 0;
  let effectDone = 0;

  data.forEach(item => {

    if (item.theme) themeDone++;
    if (item.effect) effectDone++;

    /* ANDフィルター */
    if (selectedType === 'theme' && item.theme) return;
    if (selectedType === 'effect' && item.effect) return;

    if (selectedYear !== 'all' && item.year !== selectedYear) return;

    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <img src="${item.img}">
      <div>${item.name}</div>
      <div>${item.year}</div>

      <div class="btn-group">
        <button class="btn ${item.theme ? 'got' : ''}">テーマ</button>
        <button class="btn ${item.effect ? 'got' : ''}">エフェクト</button>
      </div>
    `;

    const btns = div.querySelectorAll('button');

    btns[0].onclick = () => {
      item.theme = !item.theme;
      render();
    };

    btns[1].onclick = () => {
      item.effect = !item.effect;
      render();
    };

    list.appendChild(div);
  });

  updateBar('theme', themeDone);
  updateBar('effect', effectDone);
}

/* 進捗バー */
function updateBar(type, done) {
  const total = data.length;
  const percent = Math.floor(done / total * 100);

  document.getElementById('bar_' + type).style.width = percent + '%';
  document.getElementById('text_' + type).textContent =
    `${done}/${total} (${percent}%)`;
}

/* フィルター操作 */
function setType(t) {
  selectedType = t;
  render();
}

function setYear(y) {
  selectedYear = y;
  render();
}

/* 未取得一覧 */
function showMissing(type) {
  const missing = data.filter(d => !d[type]);
  alert(missing.map(m => m.name).join('\\n') || '全部取得済み！');
}

/* 初期化 */
createYearFilter();
render();
</script>

</body>
</html>
