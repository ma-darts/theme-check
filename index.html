<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>画像管理アプリ</title>
<style>
body { font-family: sans-serif; padding: 10px; }
h1 { font-size: 20px; }

.controls { margin-bottom: 10px; }

.card {
  border: 1px solid #ccc;
  padding: 8px;
  margin: 5px;
  display: inline-block;
  width: 150px;
  vertical-align: top;
}

img {
  width: 100%;
}

button {
  margin-top: 5px;
  width: 100%;
}

.active {
  background: #4caf50;
  color: white;
}
</style>
</head>

<body>

<h1>画像管理アプリ</h1>

<div class="controls">
  <input type="file" id="file">
  <input type="text" id="year" placeholder="年度">
  <select id="type">
    <option value="player">プレイヤー</option>
    <option value="maker">メーカー</option>
    <option value="other">その他</option>
  </select>
  <button onclick="addImage()">追加</button>
</div>

<div class="controls">
  <input type="text" id="filterYear" placeholder="年度フィルター">
  <select id="filterType">
    <option value="">種類すべて</option>
    <option value="player">プレイヤー</option>
    <option value="maker">メーカー</option>
    <option value="other">その他</option>
  </select>
  <button onclick="render()">フィルター適用</button>
</div>

<div class="controls">
  <button onclick="loadInitialData()">初期データ読み込み</button>
</div>

<div id="list"></div>

<script>
function getData() {
  return JSON.parse(localStorage.getItem('images') || '[]');
}

function saveData(data) {
  localStorage.setItem('images', JSON.stringify(data));
}

function generateId() {
  return Date.now().toString();
}

function addImage() {
  const file = document.getElementById('file').files[0];
  const year = document.getElementById('year').value;
  const type = document.getElementById('type').value;

  if (!file || !year) {
    alert('画像と年度を入力');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const data = getData();

    data.push({
      id: generateId(),
      image: e.target.result,
      year,
      type,
      theme: false,
      effect: false
    });

    saveData(data);
    render();
  };
  reader.readAsDataURL(file);
}

function toggle(id, key) {
  const data = getData();
  const item = data.find(d => d.id === id);
  item[key] = !item[key];
  saveData(data);
  render();
}

function removeItem(id) {
  let data = getData();
  data = data.filter(d => d.id !== id);
  saveData(data);
  render();
}

function render() {
  const list = document.getElementById('list');
  const data = getData();

  const filterYear = document.getElementById('filterYear').value;
  const filterType = document.getElementById('filterType').value;

  const filtered = data.filter(d => {
    return (!filterYear || d.year.includes(filterYear)) &&
           (!filterType || d.type === filterType);
  });

  list.innerHTML = '';

  filtered.forEach(d => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${d.image}">
      <div>${d.year} / ${d.type}</div>
      <button class="${d.theme ? 'active' : ''}" onclick="toggle('${d.id}','theme')">テーマ</button>
      <button class="${d.effect ? 'active' : ''}" onclick="toggle('${d.id}','effect')">エフェクト</button>
      <button onclick="removeItem('${d.id}')">削除</button>
    `;

    list.appendChild(div);
  });
}

async function loadInitialData() {
  try {
    const res = await fetch('data.json');
    const newData = await res.json();

    const saved = getData();

    const merged = [
      ...saved,
      ...newData.filter(n => !saved.some(s => s.id === n.id))
    ];

    saveData(merged);
    render();

    alert('初期データ読み込み完了');
  } catch (e) {
    alert('読み込み失敗');
  }
}

render();
</script>

</body>
</html>
