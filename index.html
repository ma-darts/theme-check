<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>画像管理</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 10px;
  max-width: 480px;
  margin-inline: auto;
}

h1 {
  font-size: 18px;
  text-align: center;
}

/* 進捗バー */
.progress {
  height: 14px;
  background: #eee;
  margin: 10px 0;
}

.bar {
  height: 100%;
  background: #4caf50;
  width: 0%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 10px;
  transition: width 0.3s;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.card {
  border: 1px solid #ccc;
  padding: 5px;
  text-align: center;
}

img {
  width: 100%;
  height: auto;
}

button {
  width: 100%;
  margin-top: 4px;
  font-size: 12px;
}

.active {
  background: #4caf50;
  color: white;
}
</style>
</head>

<body>

<h1>画像管理</h1>

<!-- 進捗バー -->
<div class="progress">
  <div class="bar" id="bar">
    <span id="progressText"></span>
  </div>
</div>

<div id="list" class="grid"></div>

<script>
const ADMIN_MODE = false; // trueで管理機能ON

function getData() {
  return JSON.parse(localStorage.getItem('images') || '[]');
}

function saveData(data) {
  localStorage.setItem('images', JSON.stringify(data));
}

/* 初期データ自動読み込み */
async function loadInitialData() {
  try {
    const res = await fetch('data.json');
    const newData = await res.json();

    const saved = getData();

    const merged = [
      ...saved,
      ...newData.filter(n => !saved.some(s => s.id === n.id))
    ];

    saveData(merged);
    render();
  } catch (e) {
    console.log('初期データ読み込み失敗');
  }
}

/* トグル */
function toggle(id, key) {
  const data = getData();
  const item = data.find(d => d.id === id);
  item[key] = !item[key];
  saveData(data);
  render();
}

/* 削除（管理者のみ） */
function removeItem(id) {
  if (!ADMIN_MODE) return;
  let data = getData();
  data = data.filter(d => d.id !== id);
  saveData(data);
  render();
}

/* 描画 */
function render() {
  const list = document.getElementById('list');
  const data = getData();

  list.innerHTML = '';

  let total = data.length;
  let done = 0;

  data.forEach(d => {
    if (d.theme || d.effect) done++;

    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <img src="${d.image}">
      <div>${d.name || ''}</div>
      <button class="${d.theme ? 'active' : ''}" onclick="toggle('${d.id}','theme')">テーマ</button>
      <button class="${d.effect ? 'active' : ''}" onclick="toggle('${d.id}','effect')">エフェクト</button>
      ${ADMIN_MODE ? `<button onclick="removeItem('${d.id}')">削除</button>` : ''}
    `;

    list.appendChild(div);
  });

  /* 進捗更新 */
  const percent = total ? Math.floor((done / total) * 100) : 0;

  const bar = document.getElementById('bar');
  const text = document.getElementById('progressText');

  bar.style.width = Math.max(percent, 5) + '%';
  text.textContent = `${done}/${total} (${percent}%)`;

  /* 100%で色変化 */
  bar.style.background = percent === 100 ? '#2196f3' : '#4caf50';
}

/* 起動時 */
loadInitialData();
render();
</script>

</body>
</html>
