<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テーマ・エフェクト管理</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
}

.notice {
  background: #ffeb3b;
  padding: 5px;
  margin-bottom: 10px;
  display: none;
}

.filter button {
  margin: 3px;
}

/* 進捗バー */
.progress {
  position: relative;
  height: 16px;
  background: #eee;
  margin: 15px auto;
  width: 50%;
  max-width: 300px;
  cursor: pointer;
}

.bar {
  height: 100%;
  background: #4caf50;
  width: 0%;
}

.progress span {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 11px;
  font-weight: bold;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
}

.item {
  text-align: center;
  font-size: 12px;
}

.item img {
  width: 100%;
}

/* ボタン */
.btn {
  display: block;
  margin-top: 3px;
  font-size: 10px;
  cursor: pointer;
}

.got {
  background: #4caf50;
  color: white;
}

/* モーダル */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
}

.hidden {
  display: none;
}

.modal-content {
  background: white;
  padding: 20px;
  width: 300px;
}
</style>
</head>

<body>

<h2>テーマ・エフェクト管理</h2>

<div id="notice" class="notice"></div>

<!-- 種類フィルター -->
<div class="filter">
  <button onclick="setTypeFilter('all')">全体</button>
  <button onclick="setTypeFilter('theme')">テーマ(Live2)</button>
  <button onclick="setTypeFilter('effect')">エフェクト(Live3)</button>
</div>

<!-- 年度フィルター -->
<div class="filter" id="yearFilter"></div>

<h3>テーマ</h3>
<div class="progress" onclick="showMissing('theme')">
  <div class="bar" id="bar_theme"></div>
  <span id="text_theme"></span>
</div>

<h3>エフェクト</h3>
<div class="progress" onclick="showMissing('effect')">
  <div class="bar" id="bar_effect"></div>
  <span id="text_effect"></span>
</div>

<div class="grid" id="list"></div>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>未取得</h3>
    <ul id="missingList"></ul>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const data = [
  { name: 'item1', img: 'item1.png', year: 2023, theme: false, effect: false },
  { name: 'item2', img: 'item2.png', year: 2024, theme: false, effect: false }
];

let typeFilter = 'all';
let yearFilter = 'all';

/* 保存 */
function save() {
  localStorage.setItem('collection', JSON.stringify(data));
}

function load() {
  const saved = localStorage.getItem('collection');
  if (saved) {
    const parsed = JSON.parse(saved);
    parsed.forEach((item, i) => {
      data[i].theme = item.theme;
      data[i].effect = item.effect;
    });
  }
}

/* 年度ボタン生成 */
function createYearFilter() {
  const container = document.getElementById('yearFilter');
  container.innerHTML = '';

  const years = [...new Set(data.map(d => d.year))];

  const allBtn = document.createElement('button');
  allBtn.textContent = 'すべて';
  allBtn.onclick = () => setYearFilter('all');
  container.appendChild(allBtn);

  years.forEach(y => {
    const btn = document.createElement('button');
    btn.textContent = y;
    btn.onclick = () => setYearFilter(y);
    container.appendChild(btn);
  });
}

/* 描画 */
function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  let themeDone = 0;
  let effectDone = 0;

  data.forEach(item => {
    if (item.theme) themeDone++;
    if (item.effect) effectDone++;

    if (typeFilter === 'theme' && item.theme) return;
    if (typeFilter === 'effect' && item.effect) return;

    if (yearFilter !== 'all' && item.year !== yearFilter) return;

    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <img src="${item.img}">
      <div>${item.name}</div>
      <div>${item.year}</div>
      <button class="btn ${item.theme ? 'got' : ''}">テーマ</button>
      <button class="btn ${item.effect ? 'got' : ''}">エフェクト</button>
    `;

    const btns = div.querySelectorAll('button');

    btns[0].onclick = () => {
      item.theme = !item.theme;
      render();
    };

    btns[1].onclick = () => {
      item.effect = !item.effect;
      render();
    };

    list.appendChild(div);
  });

  updateBar('theme', themeDone);
  updateBar('effect', effectDone);

  save();
}

function updateBar(type, done) {
  const total = data.length;
  const percent = Math.floor(done / total * 100);

  document.getElementById('bar_' + type).style.width = percent + '%';
  document.getElementById('text_' + type).textContent =
    `${done}/${total} (${percent}%)`;
}

/* フィルター */
function setTypeFilter(f) {
  typeFilter = f;
  render();
}

function setYearFilter(y) {
  yearFilter = y;
  render();
}

/* 未取得 */
function showMissing(type) {
  const list = document.getElementById('missingList');
  list.innerHTML = '';

  data.forEach(item => {
    if (!item[type]) {
      const li = document.createElement('li');
      li.textContent = item.name;

      li.onclick = () => {
        item[type] = true;
        render();
        showMissing(type);
      };

      list.appendChild(li);
    }
  });

  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

/* 初期化 */
load();
createYearFilter();
render();
</script>

</body>
</html>
