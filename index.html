<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>テーマ・エフェクト管理</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
}

/* 通知 */
.notice {
  background: #ffeb3b;
  padding: 5px;
  margin-bottom: 10px;
  display: none;
}

/* フィルター */
.filter button {
  margin-right: 5px;
}

/* 進捗バー */
.progress {
  position: relative;
  height: 16px;
  background: #eee;
  margin: 10px 0;
  cursor: pointer;
}

.bar {
  height: 100%;
  background: #4caf50;
  width: 0%;
}

.progress span {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 11px;
  font-weight: bold;
  color: #000;
  text-shadow: 0 0 2px #fff;
}

/* グリッド */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.item {
  width: 90px;
  text-align: center;
  font-size: 11px;
}

.item img {
  width: 100%;
}

/* ボタン */
.btn {
  display: block;
  margin-top: 3px;
  font-size: 10px;
  cursor: pointer;
}

.got {
  background: #4caf50;
  color: white;
}

/* モーダル */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
}

.hidden {
  display: none;
}

.modal-content {
  background: white;
  padding: 20px;
  width: 300px;
  max-height: 70%;
  overflow-y: auto;
  border-radius: 8px;
}

#missingList li {
  cursor: pointer;
  padding: 4px;
}

#missingList li:hover {
  background: #eee;
}
</style>
</head>

<body>

<h2>テーマ・エフェクト管理</h2>

<div id="notice" class="notice"></div>

<div class="filter">
  <button onclick="setFilter('all')">全体</button>
  <button onclick="setFilter('theme')">テーマ</button>
  <button onclick="setFilter('effect')">エフェクト</button>
</div>

<!-- テーマ進捗 -->
<h3>テーマ</h3>
<div class="progress" onclick="showMissing('theme')">
  <div class="bar" id="bar_theme"></div>
  <span id="text_theme"></span>
</div>

<!-- エフェクト進捗 -->
<h3>エフェクト</h3>
<div class="progress" onclick="showMissing('effect')">
  <div class="bar" id="bar_effect"></div>
  <span id="text_effect"></span>
</div>

<div class="grid" id="list"></div>

<!-- モーダル -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>未取得</h3>
    <ul id="missingList"></ul>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
/* ===== データ（共通画像） ===== */
const data = [
  { name: 'item1', img: 'item1.png', theme: false, effect: false },
  { name: 'item2', img: 'item2.png', theme: false, effect: false }
];

let filter = 'all';

/* ===== 保存 ===== */
function save() {
  localStorage.setItem('collection', JSON.stringify(data));
}

function load() {
  const saved = localStorage.getItem('collection');
  if (saved) {
    const parsed = JSON.parse(saved);
    parsed.forEach((item, i) => {
      data[i].theme = item.theme;
      data[i].effect = item.effect;
    });
  }
}

/* ===== 更新通知 ===== */
function checkUpdate() {
  const saved = localStorage.getItem('collection');
  if (!saved) return;

  const old = JSON.parse(saved);
  if (data.length > old.length) {
    const notice = document.getElementById('notice');
    notice.style.display = 'block';
    notice.textContent = `新規追加: ${data.length - old.length}件`;
  }
}

/* ===== 描画 ===== */
function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  let themeDone = 0;
  let effectDone = 0;

  data.forEach(item => {
    if (item.theme) themeDone++;
    if (item.effect) effectDone++;

    // フィルター（どちらか未取得なら表示）
    if (filter === 'theme' && item.theme) return;
    if (filter === 'effect' && item.effect) return;

    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <img src="${item.img}">
      <div>${item.name}</div>
      <button class="btn ${item.theme ? 'got' : ''}">
        テーマ
      </button>
      <button class="btn ${item.effect ? 'got' : ''}">
        エフェクト
      </button>
    `;

    const btns = div.querySelectorAll('button');

    btns[0].onclick = () => {
      item.theme = !item.theme;
      render();
    };

    btns[1].onclick = () => {
      item.effect = !item.effect;
      render();
    };

    list.appendChild(div);
  });

  updateBar('theme', themeDone);
  updateBar('effect', effectDone);

  save();
}

function updateBar(type, done) {
  const total = data.length;
  const percent = Math.floor(done / total * 100);

  document.getElementById('bar_' + type).style.width = percent + '%';
  document.getElementById('text_' + type).textContent =
    `${done}/${total} (${percent}%)`;
}

/* ===== フィルター ===== */
function setFilter(f) {
  filter = f;
  render();
}

/* ===== 未取得 ===== */
function showMissing(type) {
  const list = document.getElementById('missingList');
  list.innerHTML = '';

  data.forEach(item => {
    if (!item[type]) {
      const li = document.createElement('li');
      li.textContent = item.name;

      li.onclick = () => {
        item[type] = true;
        render();
        showMissing(type);
      };

      list.appendChild(li);
    }
  });

  if (!list.innerHTML) {
    list.innerHTML = '<li>全部取得済み！🎉</li>';
  }

  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

/* ===== 初期化 ===== */
load();
checkUpdate();
render();
</script>

</body>
</html>
