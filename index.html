<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>コレクション管理</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
}

/* フィルター */
.filter button {
  margin-right: 5px;
}

/* 進捗バー */
.progress {
  position: relative;
  height: 16px;
  background: #eee;
  margin: 10px 0;
  cursor: pointer;
}

.bar {
  height: 100%;
  background: #4caf50;
  width: 0%;
  transition: width 0.3s;
}

.progress span {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 11px;
  font-weight: bold;
  color: #000;
  text-shadow: 0 0 2px #fff;
}

/* グリッド */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.item {
  width: 80px;
  text-align: center;
  cursor: pointer;
}

.item img {
  width: 100%;
  border: 2px solid transparent;
}

.item.got img {
  border-color: green;
  opacity: 1;
}

.item:not(.got) img {
  opacity: 0.3;
}

/* モーダル */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
}

.hidden {
  display: none;
}

.modal-content {
  background: white;
  padding: 20px;
  width: 300px;
  max-height: 70%;
  overflow-y: auto;
  border-radius: 8px;
}

#missingList li {
  cursor: pointer;
  padding: 4px;
}

#missingList li:hover {
  background: #eee;
}

/* 通知 */
.notice {
  background: #ffeb3b;
  padding: 5px;
  margin-bottom: 10px;
  display: none;
}
</style>
</head>

<body>

<h2>コレクション管理</h2>

<div class="notice" id="notice"></div>

<!-- フィルター -->
<div class="filter">
  <button onclick="setFilter('all')">全体</button>
  <button onclick="setFilter('テーマ')">テーマ</button>
  <button onclick="setFilter('エフェクト')">エフェクト</button>
</div>

<!-- テーマ -->
<h3>テーマ</h3>
<div class="progress" onclick="showMissing('テーマ')">
  <div class="bar" id="bar_theme"></div>
  <span id="text_theme"></span>
</div>
<div class="grid" id="themeList"></div>

<!-- エフェクト -->
<h3>エフェクト</h3>
<div class="progress" onclick="showMissing('エフェクト')">
  <div class="bar" id="bar_effect"></div>
  <span id="text_effect"></span>
</div>
<div class="grid" id="effectList"></div>

<!-- モーダル -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>未取得</h3>
    <ul id="missingList"></ul>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
/* ===== データ ===== */
const data = [
  {
    name: 'テーマ',
    items: [
      { name: 'theme1', img: 'theme1.png' },
      { name: 'theme2', img: 'theme2.png' }
    ]
  },
  {
    name: 'エフェクト',
    items: [
      { name: 'effect1', img: 'effect1.png' },
      { name: 'effect2', img: 'effect2.png' }
    ]
  }
];

/* ===== 状態 ===== */
let filter = 'all';

/* ===== 保存 ===== */
function save() {
  localStorage.setItem('collection', JSON.stringify(data));
}

function load() {
  const saved = localStorage.getItem('collection');
  if (saved) {
    const parsed = JSON.parse(saved);
    parsed.forEach((cat, i) => {
      cat.items.forEach((item, j) => {
        data[i].items[j].got = item.got;
      });
    });
  }
}

/* ===== 更新通知 ===== */
function checkUpdate() {
  const saved = localStorage.getItem('collection');
  if (!saved) return;

  const old = JSON.parse(saved);
  let newCount = 0;

  data.forEach((cat, i) => {
    cat.items.forEach((item, j) => {
      if (!old[i] || !old[i].items[j]) newCount++;
    });
  });

  if (newCount > 0) {
    const notice = document.getElementById('notice');
    notice.style.display = 'block';
    notice.textContent = `新アイテム追加: ${newCount}件`;
  }
}

/* ===== 描画 ===== */
function render() {
  renderCategory('テーマ', 'themeList', 'bar_theme', 'text_theme');
  renderCategory('エフェクト', 'effectList', 'bar_effect', 'text_effect');
  save();
}

function renderCategory(name, listId, barId, textId) {
  const category = data.find(c => c.name === name);
  const list = document.getElementById(listId);
  list.innerHTML = '';

  let done = 0;

  category.items.forEach(item => {
    if (item.got) done++;

    // フィルター（未取得なら絶対表示）
    if (filter !== 'all' && name !== filter && item.got) return;

    const div = document.createElement('div');
    div.className = 'item ' + (item.got ? 'got' : '');

    div.innerHTML = `
      <img src="${item.img}">
      <div>${item.name}</div>
    `;

    div.onclick = () => {
      item.got = !item.got;
      render();
    };

    list.appendChild(div);
  });

  const total = category.items.length;
  const percent = total ? Math.floor(done / total * 100) : 0;

  document.getElementById(barId).style.width = percent + '%';
  document.getElementById(textId).textContent =
    `${done}/${total} (${percent}%)`;
}

/* ===== フィルター ===== */
function setFilter(f) {
  filter = f;
  render();
}

/* ===== 未取得表示 ===== */
function showMissing(type) {
  const list = document.getElementById('missingList');
  list.innerHTML = '';

  const category = data.find(c => c.name === type);

  category.items.forEach(item => {
    if (!item.got) {
      const li = document.createElement('li');
      li.textContent = item.name;

      li.onclick = () => {
        item.got = true;
        render();
        showMissing(type);
      };

      list.appendChild(li);
    }
  });

  if (!list.innerHTML) {
    list.innerHTML = '<li>全部取得済み！🎉</li>';
  }

  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

/* ===== 初期化 ===== */
load();
checkUpdate();
render();
</script>

</body>
</html>
